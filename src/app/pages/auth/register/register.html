<div class="flex align-items-center justify-content-center min-h-screen">
  <p-card header="Registro" class="w-25rem">

    <div class="flex flex-column gap-3">

      <span class="p-float-label">
        <input pInputText id="user" />
        <label for="user">Usuario</label>
      </span>

      <span class="p-float-label">
        <input pInputText type="email" id="email" />
        <label for="email">Correo</label>
      </span>

      <span class="p-float-label">
        <input pInputText type="password" id="pass" />
        <label for="pass">Password</label>
      </span>

      <span class="p-float-label">
        <input pInputText type="password" id="pass2" />
        <label for="pass2">Confirmar Password</label>
      </span>

      <p-button 
        label="Registrarse"
        icon="pi pi-user-plus"
        severity="success"
        routerLink="/auth/login">
      </p-button>

    </div>

  </p-card>
</div>
