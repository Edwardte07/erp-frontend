<div class="flex align-items-center justify-content-center min-h-screen">
  <p-card header="Registro" class="w-30rem">

    <form [formGroup]="form" class="flex flex-column gap-3 w-full" (ngSubmit)="submit()">

      <span class="p-float-label w-full">
        <input class="w-full" pInputText id="username" formControlName="username" />
        <label for="username">Usuario</label>
      </span>
      <small class="p-error" *ngIf="c('username')?.touched && c('username')?.invalid">
        Requerido
      </small>
      <br>

      <span class="p-float-label w-full">
        <input class="w-full" pInputText id="email" formControlName="email" />
        <label for="email">Email</label>
      </span>
      <small class="p-error" *ngIf="c('email')?.touched && c('email')?.invalid">
        Email válido requerido
      </small>
      <br>

      <span class="p-float-label w-full">
        <input class="w-full" pInputText id="fullname" formControlName="fullName" />
        <label for="fullname">Nombre completo</label>
      </span>
      <small class="p-error" *ngIf="c('fullName')?.touched && c('fullName')?.invalid">
        Requerido
      </small>
      <br>

      <span class="p-float-label w-full">
        <input class="w-full" pInputText id="address" formControlName="address" />
        <label for="address">Dirección</label>
      </span>
      <small class="p-error" *ngIf="c('address')?.touched && c('address')?.invalid">
        Requerido
      </small>
      <br>

      <span class="p-float-label w-full">
        <input
          class="w-full"
          pInputText
          id="phone"
          formControlName="phone"
          pKeyFilter="int"
          maxlength="10" />
        <label for="phone">Teléfono (10 dígitos)</label>
      </span>
      <small class="p-error" *ngIf="c('phone')?.touched && c('phone')?.invalid">
        Solo números, 10 dígitos
      </small>
      <br>

      <span class="p-float-label w-full">
        <p-calendar
          class="w-full"
          inputId="birthdate"
          formControlName="birthdate"
          [showIcon]="true"
          styleClass="w-full"
          inputStyleClass="w-full">
        </p-calendar>
        <label for="birthdate">Fecha de nacimiento</label>
      </span>
      <small class="p-error" *ngIf="c('birthdate')?.touched && c('birthdate')?.hasError('required')">
        Requerido
      </small>
      <small class="p-error" *ngIf="c('birthdate')?.touched && c('birthdate')?.hasError('underage')">
        Solo mayores de edad (18+)
      </small>
      <br>

      <span class="p-float-label p-input-icon-right w-full">
        <input
          class="w-full"
          pInputText
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          maxlength="10"
          (input)="limitTo10('password')" />
        <i
          class="pi"
          [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"
          (click)="togglePassword()"
          style="cursor: pointer;">
        </i>
        <label for="password">Contraseña</label>
      </span>

      <small class="p-error" *ngIf="c('password')?.touched && c('password')?.hasError('required')">
        Requerido
      </small>
      <small class="p-error" *ngIf="c('password')?.touched && c('password')?.hasError('min10')">
        Mínimo 10 caracteres
      </small>
      <small class="p-error" *ngIf="c('password')?.touched && c('password')?.hasError('max10')">
        Máximo 10 caracteres
      </small>
      <small class="p-error" *ngIf="c('password')?.touched && c('password')?.hasError('symbol')">
        Debe incluir al menos 1 símbolo: (!@#$)
      </small>
      <br>

      <!-- CONFIRMAR CONTRASEÑA -->
      <span class="p-float-label p-input-icon-right w-full">
        <input
          class="w-full"
          pInputText
          id="confirm"
          [type]="showConfirm ? 'text' : 'password'"
          formControlName="confirmPassword"
          maxlength="10"
          (input)="limitTo10('confirmPassword')" />
        <i
          class="pi"
          [ngClass]="showConfirm ? 'pi-eye-slash' : 'pi-eye'"
          (click)="toggleConfirm()"
          style="cursor: pointer;">
        </i>
        <label for="confirm">Confirmar contraseña</label>
      </span>
      <small class="p-error" *ngIf="c('confirmPassword')?.touched && c('confirmPassword')?.hasError('required')">
        Requerido
      </small>
      <small class="p-error" *ngIf="c('confirmPassword')?.touched && form.hasError('mismatch')">
        Las contraseñas no coinciden
      </small>
      <br>

      <p-button
        class="w-full"
        type="submit"
        label="Registrar"
        icon="pi pi-user-plus"
        severity="success"
        [disabled]="form.invalid">
      </p-button>

      <p-button
        class="w-full"
        label="Volver al login"
        severity="secondary"
        routerLink="/auth/login">
      </p-button>

    </form>

  </p-card>
</div>
